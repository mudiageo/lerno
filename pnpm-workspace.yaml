packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  '@fontsource-variable/inter': ^5.2.8
  '@lucide/svelte': ^0.577.0
  '@types/node': ^24
  clsx: ^2.1.1
  dotenv: ^17.3.1
  drizzle-kit: ^0.31.10
  drizzle-orm: ^0.30.10
  help: ^3.0.2
  postgres: ^3.4.8
  tailwind-merge: ^3.5.0
  tailwind-variants: ^3.2.2
  tw-animate-css: ^1.4.0
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.13
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer

overrides:
  vite: 'catalog:'
  vitest: 'catalog:'

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
